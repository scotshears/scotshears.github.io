  <style>
    :root { --navy:#0d1b36; --navy2:#172a4f; --amber:#f5b43c; --white:#f8fafc; --sub:#bccbe0; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(120% 90% at 50% 0%, var(--navy2) 0%, var(--navy) 70%);
      color:var(--white); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:34px 22px;
    }
    .trial {
      letter-spacing:.14em; font-weight:800; font-size:.8rem; color:var(--amber);
      text-transform:uppercase; margin-bottom:24px;
      border:1.5px solid rgba(245,180,60,.5); border-radius:999px; padding:7px 16px;
    }
    .icon {
      width:132px; height:132px; border-radius:29px; display:block; margin:0 auto 26px;
      box-shadow:0 18px 44px rgba(0,0,0,.55); background:var(--navy);
    }
    h1 { font-size:2.55rem; line-height:1.05; margin:0 0 14px; letter-spacing:-.01em; }
    p.tag { font-size:1.16rem; line-height:1.5; color:var(--sub); margin:0 auto 34px; max-width:24rem; }
    .btn {
      display:inline-flex; align-items:center; gap:10px;
      background:var(--amber); color:#0d1b36; font-weight:700; font-size:1.18rem;
      text-decoration:none; padding:17px 34px; border-radius:16px;
      box-shadow:0 12px 30px rgba(245,180,60,.35); transition:transform .12s ease;
    }
    .btn:active { transform:scale(.97); }
    .foot { margin-top:28px; font-size:.9rem; color:var(--sub); }
    .foot a { color:var(--amber); text-decoration:none; }
    @media (max-width:400px){ h1{font-size:2.15rem;} .icon{width:114px;height:114px;} }
